name: StreamLens assessment

on:
  pull_request:

permissions:
  contents: read

env:
  # Immutable assessment version v2; baseline-v2 is its human-readable alias.
  BASELINE_COMMIT: "6b25bcaca101b840db27a5bfabbfadb7a523a6d6"
  CANDIDATE_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
  CANDIDATE_SHA: ${{ github.event.pull_request.head.sha }}
  UPSTREAM_REPOSITORY: ${{ github.event.pull_request.base.repo.full_name }}
  UPSTREAM_BASE_SHA: ${{ github.event.pull_request.base.sha }}

concurrency:
  group: assessment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  assess:
    name: Correctness and performance
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out exact candidate revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.CANDIDATE_REPOSITORY }}
          ref: ${{ env.CANDIDATE_SHA }}
          path: candidate
          fetch-depth: 1
          persist-credentials: false

      - name: Check out immutable baseline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ env.BASELINE_COMMIT }}
          path: baseline
          fetch-depth: 1
          persist-credentials: false

      - name: Verify candidate revision and fetch upstream base
        working-directory: candidate
        run: |
          actual_commit=$(git rev-parse HEAD)
          if [[ "$actual_commit" != "$CANDIDATE_SHA" ]]; then
            echo "Candidate checkout mismatch: expected $CANDIDATE_SHA, got $actual_commit" >&2
            exit 1
          fi
          if ! git cat-file -e "$UPSTREAM_BASE_SHA^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 "https://github.com/${UPSTREAM_REPOSITORY}.git" "$UPSTREAM_BASE_SHA"
          fi
          git cat-file -e "$UPSTREAM_BASE_SHA^{commit}"

      - name: Verify immutable baseline revision
        working-directory: baseline
        run: |
          actual_commit=$(git rev-parse HEAD)
          if [[ "$actual_commit" != "$BASELINE_COMMIT" ]]; then
            echo "Baseline checkout mismatch: expected $BASELINE_COMMIT, got $actual_commit" >&2
            exit 1
          fi
          echo "Using immutable baseline $actual_commit"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: baseline/go.mod
          cache-dependency-path: baseline/go.mod

      - name: Validate protected files
        id: protected
        continue-on-error: true
        working-directory: candidate
        run: bash "$GITHUB_WORKSPACE/baseline/scripts/check-protected.sh" "$UPSTREAM_BASE_SHA" "$CANDIDATE_SHA"

      - name: Run functional tests
        id: tests
        if: steps.protected.outcome == 'success'
        continue-on-error: true
        working-directory: candidate
        run: go test ./... -timeout 5m

      - name: Run alternating benchmark samples and compare
        id: benchmarks
        if: steps.protected.outcome == 'success' && steps.tests.outcome == 'success'
        continue-on-error: true
        working-directory: baseline
        run: |
          bash "$GITHUB_WORKSPACE/baseline/scripts/run-benchmarks.sh" "$GITHUB_WORKSPACE/baseline" "$GITHUB_WORKSPACE/candidate" "$GITHUB_WORKSPACE/benchmark-results"
          go run ./cmd/benchcompare \
            -baseline "$GITHUB_WORKSPACE/benchmark-results/baseline.txt" \
            -candidate "$GITHUB_WORKSPACE/benchmark-results/candidate.txt" \
            -output "$GITHUB_WORKSPACE/benchmark-results/report.md" \
            -min-samples 5

      - name: Capture CPU and allocation profiles
        id: profiles
        if: always() && steps.protected.outcome == 'success' && steps.tests.outcome == 'success'
        continue-on-error: true
        working-directory: baseline
        env:
          PROFILE_PROJECT_DIRECTORY: ${{ github.workspace }}/candidate
          PROFILE_TIME: 1s
        run: bash "$GITHUB_WORKSPACE/baseline/scripts/profile.sh" all Balanced "$GITHUB_WORKSPACE/benchmark-results/profiles"

      - name: Upload benchmark and profile artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: streamlens-benchmark-${{ github.event.pull_request.number }}
          path: benchmark-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Write assessment summary
        if: always()
        env:
          PROTECTED_STATUS: ${{ steps.protected.outcome }}
          TEST_STATUS: ${{ steps.tests.outcome }}
          BENCHMARK_STATUS: ${{ steps.benchmarks.outcome }}
          PROFILE_STATUS: ${{ steps.profiles.outcome }}
        run: |
          {
            echo "# StreamLens assessment"
            echo
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| Protected files | $PROTECTED_STATUS |"
            echo "| Functional tests | $TEST_STATUS |"
            echo "| Performance gate | $BENCHMARK_STATUS |"
            echo "| Profile capture | $PROFILE_STATUS |"
            echo
            if [[ -f benchmark-results/report.md ]]; then
              cat benchmark-results/report.md
            elif [[ "$PROTECTED_STATUS" != "success" ]]; then
              echo "Performance comparison was skipped because protected files changed."
            elif [[ "$TEST_STATUS" != "success" ]]; then
              echo "Performance comparison was skipped because functional tests failed."
            else
              echo "Performance comparison did not produce a report. Inspect the raw job log."
            fi
            if [[ -f benchmark-results/profiles/cpu-top.txt ]]; then
              echo
              echo "## CPU profile (top)"
              echo
              echo '```text'
              sed -n '1,20p' benchmark-results/profiles/cpu-top.txt
              echo '```'
            fi
            if [[ -f benchmark-results/profiles/alloc-top.txt ]]; then
              echo
              echo "## Allocation profile (top)"
              echo
              echo '```text'
              sed -n '1,20p' benchmark-results/profiles/alloc-top.txt
              echo '```'
            fi
            if [[ "$PROFILE_STATUS" != "success" ]]; then
              echo
              echo "Profile capture did not succeed. Inspect the profile step log."
            fi
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Enforce assessment result
        if: always()
        env:
          PROTECTED_STATUS: ${{ steps.protected.outcome }}
          TEST_STATUS: ${{ steps.tests.outcome }}
          BENCHMARK_STATUS: ${{ steps.benchmarks.outcome }}
          PROFILE_STATUS: ${{ steps.profiles.outcome }}
        run: |
          if [[ "$PROTECTED_STATUS" != "success" || "$TEST_STATUS" != "success" || "$BENCHMARK_STATUS" != "success" || "$PROFILE_STATUS" != "success" ]]; then
            echo "Assessment failed; see the job summary for details." >&2
            exit 1
          fi
          echo "Assessment passed."
