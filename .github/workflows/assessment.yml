name: StreamLens assessment

on:
  # The workflow definition comes only from the trusted base branch. Candidate
  # files are checked out as data and never executed by a host-side command.
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

env:
  ASSESSMENT_BASELINE_SHA: "770e8cb4e206b697c63d18d119dcb6d97d07884b"
  ASSESSMENT_DOCKER_IMAGE: "golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651"
  BENCH_SAMPLES: "7"
  BENCH_TIME: "300ms"
  BENCH_GOMAXPROCS: "1"
  PROFILE_SCENARIO: "Balanced"
  PROFILE_TIME: "2s"
  CANDIDATE_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
  CANDIDATE_SHA: ${{ github.event.pull_request.head.sha }}
  UPSTREAM_REPOSITORY: ${{ github.event.pull_request.base.repo.full_name }}
  UPSTREAM_BASE_SHA: ${{ github.event.pull_request.base.sha }}
  WORKFLOW_SHA: ${{ github.workflow_sha }}
  EVIDENCE_PARENT: ${{ github.workspace }}/assessment-evidence

concurrency:
  group: assessment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  assess:
    name: Correctness and performance
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Create private evidence directory
        run: |
          umask 077
          if [[ -e "$EVIDENCE_PARENT" || -L "$EVIDENCE_PARENT" ]]; then
            echo "Evidence directory already exists: $EVIDENCE_PARENT" >&2
            exit 2
          fi
          mkdir -m 0700 -- "$EVIDENCE_PARENT"
          {
            printf 'assessment_baseline=%s\n' "$ASSESSMENT_BASELINE_SHA"
            printf 'candidate_repository=%s\n' "$CANDIDATE_REPOSITORY"
            printf 'pull_request_base_tip=%s\n' "$UPSTREAM_BASE_SHA"
            printf 'candidate=%s\n' "$CANDIDATE_SHA"
            printf 'workflow=%s\n' "$WORKFLOW_SHA"
            printf 'container_image=%s\n' "$ASSESSMENT_DOCKER_IMAGE"
            printf 'benchmark_samples=%s\n' "$BENCH_SAMPLES"
            printf 'benchmark_time=%s\n' "$BENCH_TIME"
            printf 'benchmark_gomaxprocs=%s\n' "$BENCH_GOMAXPROCS"
            printf 'profile_scenario=%s\n' "$PROFILE_SCENARIO"
            printf 'profile_time=%s\n' "$PROFILE_TIME"
          } >"$EVIDENCE_PARENT/workflow-context.txt"

      - name: Check out immutable assessment baseline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ env.ASSESSMENT_BASELINE_SHA }}
          path: baseline
          fetch-depth: 1
          fetch-tags: false
          persist-credentials: false

      - name: Check out exact candidate revision as untrusted data
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.CANDIDATE_REPOSITORY }}
          ref: ${{ env.CANDIDATE_SHA }}
          path: candidate
          # Full commit history is needed to derive the unique PR merge base;
          # blobs remain filtered until trusted assessment code requests them.
          fetch-depth: 0
          filter: blob:none
          fetch-tags: false
          persist-credentials: false
          # Required by checkout v7 for fork heads under pull_request_target.
          # No later host step executes candidate files; trusted baseline code
          # inspects committed blobs and the analyzer runs only in the restricted
          # no-network container.
          allow-unsafe-pr-checkout: true

      - name: Check out exact pull request base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ env.UPSTREAM_BASE_SHA }}
          path: candidate-base
          fetch-depth: 0
          filter: blob:none
          fetch-tags: false
          persist-credentials: false

      - name: Check out trusted workflow revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ env.WORKFLOW_SHA }}
          path: workflow-source
          fetch-depth: 1
          fetch-tags: false
          persist-credentials: false

      - name: Verify revisions and derive candidate scope base
        id: revisions
        run: |
          verify_revision() {
            local checkout=$1
            local expected=$2
            local label=$3
            local actual

            actual=$(git -C "$checkout" -c core.fsmonitor=false -c core.hooksPath=/dev/null rev-parse --verify 'HEAD^{commit}')
            if [[ "$actual" != "$expected" ]]; then
              echo "$label checkout mismatch: expected $expected, got $actual" >&2
              exit 2
            fi
          }

          verify_revision "$GITHUB_WORKSPACE/baseline" "$ASSESSMENT_BASELINE_SHA" "Baseline"
          verify_revision "$GITHUB_WORKSPACE/candidate" "$CANDIDATE_SHA" "Candidate"
          verify_revision "$GITHUB_WORKSPACE/candidate-base" "$UPSTREAM_BASE_SHA" "Pull request base tip"
          verify_revision "$GITHUB_WORKSPACE/workflow-source" "$WORKFLOW_SHA" "Workflow"

          derive_script="$GITHUB_WORKSPACE/workflow-source/.github/scripts/derive-candidate-base.sh"
          if [[ ! -f "$derive_script" || -L "$derive_script" ]]; then
            echo "Trusted candidate-base derivation script is missing." >&2
            exit 2
          fi
          candidate_base_sha=$(env -u BASH_ENV -u ENV \
            bash --noprofile --norc "$derive_script" \
              "$GITHUB_WORKSPACE/candidate" \
              "$GITHUB_WORKSPACE/candidate-base" \
              "$UPSTREAM_BASE_SHA" \
              "$CANDIDATE_SHA")

          printf 'candidate_base_sha=%s\n' "$candidate_base_sha" >>"$GITHUB_OUTPUT"
          printf 'candidate_scope_base=%s\n' "$candidate_base_sha" \
            >>"$EVIDENCE_PARENT/workflow-context.txt"

      - name: Set up pinned Go toolchain
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: baseline/go.mod
          cache: false

      - name: Verify host Go toolchain
        working-directory: baseline
        run: |
          expected_toolchain=$(awk '$1 == "toolchain" { print $2 }' go.mod)
          actual_toolchain=$(go env GOVERSION)
          printf 'expected=%s\nactual=%s\n' "$expected_toolchain" "$actual_toolchain" \
            >"$EVIDENCE_PARENT/host-go-version.txt"
          if [[ -z "$expected_toolchain" || "$actual_toolchain" != "$expected_toolchain" ]]; then
            echo "Host Go mismatch: expected $expected_toolchain, got $actual_toolchain" >&2
            exit 2
          fi

      - name: Run trusted candidate preflight
        id: candidate_preflight
        continue-on-error: true
        working-directory: candidate
        env:
          CANDIDATE_BASE_SHA: ${{ steps.revisions.outputs.candidate_base_sha }}
        run: |
          preflight_log="$EVIDENCE_PARENT/candidate-preflight.txt"
          set +e
          env -u BASH_ENV -u ENV \
            bash --noprofile --norc "$GITHUB_WORKSPACE/baseline/scripts/check-protected.sh" \
              "$CANDIDATE_BASE_SHA" "$CANDIDATE_SHA" >"$preflight_log" 2>&1
          preflight_status=$?
          set -e
          cat "$preflight_log"
          exit "$preflight_status"

      - name: Dispatch private evaluator for the exact PR revision
        id: private_evaluator
        if: steps.candidate_preflight.outcome == 'success'
        continue-on-error: true
        env:
          # Fine-grained token scoped only to Actions: write on the private
          # evaluator repository. It is never passed to candidate code.
          GH_TOKEN: ${{ secrets.PRIVATE_EVALUATOR_DISPATCH_TOKEN }}
          CANDIDATE_BASE_SHA: ${{ steps.revisions.outputs.candidate_base_sha }}
          CANDIDATE_PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          dispatch_log="$EVIDENCE_PARENT/private-evaluator-dispatch.txt"
          dispatch_script="$GITHUB_WORKSPACE/workflow-source/.github/scripts/dispatch-private-evaluator.sh"
          if [[ ! -f "$dispatch_script" || -L "$dispatch_script" ]]; then
            echo "Trusted private-evaluator dispatch script is missing." >"$dispatch_log"
            cat "$dispatch_log"
            exit 2
          fi

          set +e
          env -u BASH_ENV -u ENV \
            bash --noprofile --norc "$dispatch_script" \
              "$CANDIDATE_REPOSITORY" \
              "$CANDIDATE_BASE_SHA" \
              "$CANDIDATE_SHA" \
              "$CANDIDATE_PR_NUMBER" \
              "$SOURCE_RUN_URL" >"$dispatch_log" 2>&1
          dispatch_status=$?
          set -e
          cat "$dispatch_log"
          exit "$dispatch_status"

      - name: Pull pinned image and run real-runtime canary
        id: canary
        continue-on-error: true
        working-directory: baseline
        run: |
          pull_log="$EVIDENCE_PARENT/docker-pull-before-canary.log"
          canary_log="$EVIDENCE_PARENT/isolation-canary.log"

          set +e
          docker pull "$ASSESSMENT_DOCKER_IMAGE" >"$pull_log" 2>&1
          pull_status=$?
          set -e
          cat "$pull_log"
          if [[ $pull_status -ne 0 ]]; then
            echo "Pinned image pull failed before the real-runtime canary." >&2
            exit 2
          fi

          set +e
          env REQUIRE_DOCKER_RUNTIME=1 \
            ASSESSMENT_DOCKER_IMAGE="$ASSESSMENT_DOCKER_IMAGE" \
            bash --noprofile --norc scripts/isolation-test.sh >"$canary_log" 2>&1
          canary_status=$?
          set -e
          cat "$canary_log"
          exit "$canary_status"

      - name: Refresh pinned image before assessment
        id: refresh_image
        if: steps.canary.outcome == 'success'
        continue-on-error: true
        run: |
          refresh_log="$EVIDENCE_PARENT/docker-pull-before-assessment.log"
          set +e
          docker pull "$ASSESSMENT_DOCKER_IMAGE" >"$refresh_log" 2>&1
          refresh_status=$?
          set -e
          cat "$refresh_log"
          exit "$refresh_status"

      - name: Run unified version 3 assessment
        id: assessor
        if: steps.canary.outcome == 'success' && steps.refresh_image.outcome == 'success'
        continue-on-error: true
        working-directory: baseline
        env:
          CANDIDATE_BASE_SHA: ${{ steps.revisions.outputs.candidate_base_sha }}
        run: |
          assessor_log="$EVIDENCE_PARENT/assessor.log"
          assessor_output="$EVIDENCE_PARENT/assessment"

          set +e
          env -u BASH_ENV -u ENV \
            ASSESSMENT_DOCKER_IMAGE="$ASSESSMENT_DOCKER_IMAGE" \
            BENCH_SAMPLES="$BENCH_SAMPLES" \
            BENCH_TIME="$BENCH_TIME" \
            BENCH_GOMAXPROCS="$BENCH_GOMAXPROCS" \
            PROFILE_SCENARIO="$PROFILE_SCENARIO" \
            PROFILE_TIME="$PROFILE_TIME" \
            bash --noprofile --norc scripts/assess.sh \
              "$GITHUB_WORKSPACE/baseline" \
              "$GITHUB_WORKSPACE/candidate" \
              "$ASSESSMENT_BASELINE_SHA" \
              "$CANDIDATE_BASE_SHA" \
              "$CANDIDATE_SHA" \
              "$assessor_output" >"$assessor_log" 2>&1
          assessor_status=$?
          set -e

          printf '%s\n' "$assessor_status" >"$EVIDENCE_PARENT/assessor-exit-code.txt"
          printf 'exit_code=%s\n' "$assessor_status" >>"$GITHUB_OUTPUT"
          cat "$assessor_log"
          exit "$assessor_status"

      - name: Write assessment summary
        if: always()
        env:
          CANARY_OUTCOME: ${{ steps.canary.outcome }}
          IMAGE_REFRESH_OUTCOME: ${{ steps.refresh_image.outcome }}
          ASSESSOR_OUTCOME: ${{ steps.assessor.outcome }}
          ASSESSOR_EXIT_CODE: ${{ steps.assessor.outputs.exit_code }}
          CANDIDATE_PREFLIGHT_OUTCOME: ${{ steps.candidate_preflight.outcome }}
          PRIVATE_EVALUATOR_OUTCOME: ${{ steps.private_evaluator.outcome }}
        run: |
          report="$EVIDENCE_PARENT/assessment/benchmarks/report.md"
          functional="$EVIDENCE_PARENT/assessment/functional.txt"
          assessor_log="$EVIDENCE_PARENT/assessor.log"
          cpu_top="$EVIDENCE_PARENT/assessment/profiles/cpu-top.txt"
          alloc_top="$EVIDENCE_PARENT/assessment/profiles/alloc-top.txt"
          protected_status="not run"
          functional_status="not run"

          if [[ -f "$assessor_log" ]] && grep -Fq 'Protected-file check passed.' "$assessor_log"; then
            protected_status="passed"
          elif [[ -f "$assessor_log" ]] && grep -Fq 'protected-scope validation failed' "$assessor_log"; then
            protected_status="failed"
          fi
          if [[ -f "$functional" ]]; then
            if [[ -f "$assessor_log" ]] && grep -Fq 'functional tests failed' "$assessor_log"; then
              functional_status="failed"
            else
              functional_status="passed"
            fi
          fi

          {
            echo "# StreamLens assessment v3"
            echo
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| Real-runtime isolation canary | $CANARY_OUTCOME |"
            echo "| Pinned-image refresh | $IMAGE_REFRESH_OUTCOME |"
            echo "| Candidate dispatch preflight | $CANDIDATE_PREFLIGHT_OUTCOME |"
            echo "| Private evaluator dispatch | $PRIVATE_EVALUATOR_OUTCOME |"
            echo "| Protected candidate scope | $protected_status |"
            echo "| Functional tests | $functional_status |"
            if [[ -n "$ASSESSOR_EXIT_CODE" ]]; then
              echo "| Unified assessor | $ASSESSOR_OUTCOME (exit $ASSESSOR_EXIT_CODE) |"
            else
              echo "| Unified assessor | $ASSESSOR_OUTCOME (not executed) |"
            fi
            echo

            if [[ -f "$report" ]]; then
              cat "$report"
            elif [[ "$CANARY_OUTCOME" != "success" ]]; then
              echo "The assessment was not executed because the exact-image real-runtime canary failed."
            elif [[ "$IMAGE_REFRESH_OUTCOME" != "success" ]]; then
              echo "The assessment was not executed because the pinned image could not be refreshed."
            elif [[ -n "$ASSESSOR_EXIT_CODE" ]]; then
              echo "The assessor exited before producing a benchmark report. Inspect the retained assessor log."
            else
              echo "The assessor was not executed because an earlier workflow setup step failed."
            fi

            if [[ -f "$cpu_top" ]]; then
              echo
              echo "## CPU profile (top)"
              echo
              echo '```text'
              sed -n '1,25p' "$cpu_top"
              echo '```'
            fi
            if [[ -f "$alloc_top" ]]; then
              echo
              echo "## Allocation profile (top)"
              echo
              echo '```text'
              sed -n '1,25p' "$alloc_top"
              echo '```'
            fi
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Upload complete assessment evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: streamlens-assessment-${{ github.event.pull_request.number }}-${{ github.run_attempt }}
          path: ${{ env.EVIDENCE_PARENT }}/
          if-no-files-found: error
          retention-days: 14

      - name: Enforce exact assessor result
        if: always()
        env:
          ASSESSOR_EXIT_CODE: ${{ steps.assessor.outputs.exit_code }}
          CANDIDATE_PREFLIGHT_OUTCOME: ${{ steps.candidate_preflight.outcome }}
          PRIVATE_EVALUATOR_OUTCOME: ${{ steps.private_evaluator.outcome }}
        run: |
          if [[ "$CANDIDATE_PREFLIGHT_OUTCOME" == "success" && \
                "$PRIVATE_EVALUATOR_OUTCOME" != "success" ]]; then
            echo "The private evaluator was not dispatched for this exact PR revision." >&2
            exit 2
          fi
          if [[ ! "$ASSESSOR_EXIT_CODE" =~ ^[0-9]+$ ]]; then
            echo "The unified assessor did not run; treating this as an infrastructure failure." >&2
            exit 2
          fi
          echo "Unified assessor exit code: $ASSESSOR_EXIT_CODE"
          exit "$ASSESSOR_EXIT_CODE"
